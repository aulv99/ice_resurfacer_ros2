# 1. THE CONTROLLER (Gas Pedal & Steering Wheel)
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    controller_plugins: ["FollowPath"]
    
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 1.0           # Cruising speed (m/s)

      lookahead_dist: 2.0               # How far ahead on the path it looks to steer
      min_lookahead_dist: 1.0
      max_lookahead_dist: 4.0
      lookahead_time: 1.5
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.2
      approach_velocity_scaling_dist: 1.5
      use_collision_detection: true     # Stop if the costmap says a crash is imminent
      max_allowed_time_to_collision_up_to_carrot: 1.0

      use_kinematics: true              # Force it to obey the limits below
      max_linear_accel: 0.25            # Very slow acceleration (prevents wheel spin)
      max_linear_decel: 0.25            # Very slow braking (prevents sliding)
      max_angular_accel: 1.0            # Turn the steering wheel slowly
      max_angular_vel: 1.5              # Cap the maximum turning speed

# 2. THE LOCAL COSTMAP (The Bumper Zone)
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.05
      footprint: "[ [1.5, 1.0], [1.5, -1.0], [-1.5, -1.0], [-1.5, 1.0] ]" # Approximate Zamboni size
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 1.0 # Pushes the robot 1 meter away from the boards

# 3. THE GLOBAL COSTMAP (For the Planner)
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      robot_radius: 1.5
      resolution: 0.05
      track_unknown_space: true
      rolling_window: true    
      width: 100              
      height: 100             
      plugins: ["obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 1.0

collision_monitor:
  ros__parameters:
    use_sim_time: True
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "velocity_smoother/state"
    transform_tolerance: 0.5
    source_timeout: 5.0
    stop_pub_timeout: 2.0
    polygons: ["PolygonStop"]
    PolygonStop:
      type: "polygon"
      points: "[[0.5, 0.5], [0.5, -0.5], [-0.5, -0.5], [-0.5, 0.5]]"
      action_type: "stop"
      min_points: 4
      visualize: True
      polygon_pub_topic: "polygon_stop"
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"

docking_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    odom_frame: "odom"
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: "odom"
    robot_base_frame: "base_link"

behavior_server:
  ros__parameters:
    use_sim_time: True
    global_frame: "odom"
    robot_base_frame: "base_link"