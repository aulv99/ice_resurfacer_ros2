controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # The 2 standard controllers to use
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

    conditioner_controller:
      type: joint_trajectory_controller/JointTrajectoryController

ackermann_steering_controller:
  ros__parameters:
    # Frame IDs
    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: false
    
    # Wheel Names
    rear_wheels_names: [rear_left_wheel_joint, rear_right_wheel_joint]
    front_wheels_names: [front_left_steering_joint, front_right_steering_joint]

    # Geometry
    wheelbase: 1.96       # 1.16 - (-0.80)
    front_wheel_track: 1.37 # 0.685 * 2
    rear_wheel_track: 1.37
    front_wheels_radius: 0.386
    rear_wheels_radius: 0.386

    use_stamped_vel: false

conditioner_controller:
  ros__parameters:
    joints:
      - conditioner_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    gains:
      conditioner_joint:
        p: 10000.0
        i: 0.0
        d: 100.0