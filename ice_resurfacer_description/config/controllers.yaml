controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # The 2 standard controllers to use
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

ackermann_steering_controller:
  ros__parameters:
    # Frame IDs
    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: false
    
    # Wheel Names
    rear_wheels_names: [rear_left_wheel_joint, rear_right_wheel_joint]
    front_wheels_names: [front_left_steering_joint, front_right_steering_joint]

    # Geometry
    wheelbase: 2.4       # Distance front-to-back
    front_wheel_track: 1.6 # Distance left-to-right
    rear_wheel_track: 1.6
    front_wheels_radius: 0.4
    rear_wheels_radius: 0.4

    use_stamped_vel: false