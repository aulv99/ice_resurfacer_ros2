# 1. THE CONTROLLER (Gas Pedal & Steering Wheel)
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    controller_plugins: ["FollowPath"]

    goal_checker_plugins: ["goal_checker"]
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25    # Must be within 25cm of X=-10, Y=0
      yaw_goal_tolerance: 0.75   # Must be facing almost exactly East
      stateful: True
    
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 2.0           # Cruising speed (m/s)

      lookahead_dist: 2.0               # How far ahead on the path it looks to steer
      min_lookahead_dist: 1.0
      max_lookahead_dist: 4.0
      lookahead_time: 1.5
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.2
      approach_velocity_scaling_dist: 1.5
      use_collision_detection: false    # Stop if the costmap says a crash is imminent
      max_allowed_time_to_collision_up_to_carrot: 1.0

      use_kinematics: true              # Force it to obey the limits below
      max_linear_accel: 0.25            # Very slow acceleration (prevents wheel spin)
      max_linear_decel: 0.25            # Very slow braking (prevents sliding)
      max_angular_accel: 1.0            # Turn the steering wheel slowly
      max_angular_vel: 1.50              # Cap the maximum turning speed

# 2. THE LOCAL COSTMAP (The Bumper Zone)
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.05
      # footprint: "[ [2.02, 0.79], [2.02, -0.79], [-3.02, -1.06], [-3.02, 1.06] ]" # Approximate Zamboni size
      robot_radius: 0.5
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 6.0  # CHANGED FROM 1.0 TO 2.0

# 3. THE GLOBAL COSTMAP (For the Planner)
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map               # CHANGED FROM 'odom'
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: False           # CRITICAL: Must be false to use static map!
      track_unknown_space: true
      # footprint: "[ [2.02, 0.79], [2.02, -0.79], [-3.02, -1.06], [-3.02, 1.06] ]"
      robot_radius: 0.5
      resolution: 0.05
      
      # CRITICAL: Added static_layer so it actually reads your edited .pgm file
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 6.0         # Bumped slightly to ensure it clears the 3.2m footprint

collision_monitor:
  ros__parameters:
    use_sim_time: True
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "velocity_smoother/state"
    transform_tolerance: 0.5
    source_timeout: 5.0
    stop_pub_timeout: 2.0
    polygons: ["PolygonStop"]
    PolygonStop:
      type: "polygon"
      points: "[[0.5, 0.5], [0.5, -0.5], [-0.5, -0.5], [-0.5, 0.5]]"
      action_type: "stop"
      min_points: 4
      visualize: True
      polygon_pub_topic: "polygon_stop"
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"

docking_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    odom_frame: "odom"
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: "odom"
    robot_base_frame: "base_link"
    default_nav_to_pose_bt_xml: "/home/aaro/ice_resurfacer_ws/src/ice_resurfacer_nav/config/navigate_to_pose_ackermann.xml"

behavior_server:
  ros__parameters:
    use_sim_time: True
    global_frame: "odom"
    robot_base_frame: "base_link"
    # We load spin to keep Nav2's boot check happy, but we won't use it!
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      downsample_costmap: true           # Set to true if CPU struggles
      downsampling_factor: 2
      tolerance: 0.25                     # Allowable distance to path
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 15.0
      motion_model_for_search: "REEDS_SHEPP"
      angle_quantization_bins: 72         # 5-degree increments
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 50.0
      minimum_turning_radius: 4.0       # CRITICAL: Zamboni's physical turn limit
      reverse_penalty: 5.0                # Discourage reversing unless necessary
      change_penalty: 0.0                 # Penalty for changing gear
      non_straight_penalty: 1.20          # Keep straight when possible
      cost_penalty: 2.0
      retrospective_penalty: 0.015
  
velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [2.0, 0.0, 1.5]  # [x (m/s), y (m/s), theta (rad/s)] - Set to match your controller!
    min_velocity: [-0.5, 0.0, -1.25]
    max_accel: [0.25, 0.0, 1.0]     # Match these to your max_linear_accel and max_angular_accel
    max_decel: [-0.25, 0.0, -1.0]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0